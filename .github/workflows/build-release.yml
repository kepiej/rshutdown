name: Cross compile for ARM64

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install cross compiler and build utils
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Cross compile
        id: cross_compile
        run: |
          mkdir build
          cd build
          cmake ..
          make -j4 package
          echo "ARM64_DEB_PACKAGE=$(basename "$(find . -maxdepth 1 -name '*.deb')")" >> "$GITHUB_OUTPUT"

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.cross_compile.outputs.ARM64_DEB_PACKAGE }}
          path: ${{ github.workspace }}/build/${{ steps.cross_compile.outputs.ARM64_DEB_PACKAGE }}
